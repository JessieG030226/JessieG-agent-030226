pipeline:
  version: "4.0.Advanced"
  stages:
    # --- Phase 1: Admin & Intake (行政與接收) ---
    - id: "intake_estar"
      agent: "eSTAR 結構解析員"
      icon: "📑"
      task: "驗證 eSTAR PDF 結構、版本及 XML 數據提取。"
      status: "Ready"
      phase: "Admin"
    - id: "intake_fee"
      agent: "申請費與 MDUFA 稽核員"
      icon: "💳"
      task: "確認使用者付費 (User Fee) 收據與繳費狀態。"
      status: "Ready"
      phase: "Admin"
    - id: "intake_reg"
      agent: "企業註冊與產品列名核對員"
      icon: "🏢"
      task: "核對製造商 FEI 碼與 FDA 註冊資料庫的一致性。"
      status: "Ready"
      phase: "Admin"
    - id: "intake_loa"
      agent: "授權信 (LOA) 審查員"
      icon: "✍️"
      task: "審查主文檔 (MAF) 或第三方授權信的合法性與效期。"
      status: "Ready"
      phase: "Admin"

    # --- Phase 2: RTA - Refuse to Accept (拒絕接受審查) ---
    - id: "rta_completeness"
      agent: "RTA 行政完整性官員"
      icon: "📋"
      task: "執行 FDA 15 天 RTA 檢查表，確保所有必填項無遺漏。"
      status: "Ready"
      phase: "RTA"
    - id: "rta_type"
      agent: "510(k) 途徑判定員"
      icon: "🛤️"
      task: "判定適用傳統 (Traditional)、特殊 (Special) 或簡化 (Abbreviated) 途徑。"
      status: "Ready"
      phase: "RTA"
    - id: "rta_device_desc"
      agent: "器械描述完整性分析師"
      icon: "🔍"
      task: "檢驗器械描述是否涵蓋運作原理、組件、尺寸與材料。"
      status: "Ready"
      phase: "RTA"
    - id: "rta_ifu"
      agent: "預期用途 (IFU) 審查員"
      icon: "🎯"
      task: "比對 FDA Form 3881 與說明書中的預期用途是否完全一致。"
      status: "Ready"
      phase: "RTA"

    # --- Phase 3: Substantive - SE (實質審查 - 實質等同性) ---
    - id: "se_core"
      agent: "實質等同性 (SE) 判定專家"
      icon: "⚖️"
      task: "根據 FDA SE 決策樹，評估新器械是否具備實質等同性。"
      status: "Ready"
      phase: "Substantive"
    - id: "se_predicate"
      agent: "對比器械 (Predicate) 驗證員"
      icon: "🔎"
      task: "驗證主對比器械的合法性、召回紀錄及 510(k) 編號有效性。"
      status: "Ready"
      phase: "Substantive"
    - id: "se_tech_compare"
      agent: "技術特徵比較分析師"
      icon: "📊"
      task: "審查新器械與對比器械的技術參數對比表，標註差異。"
      status: "Ready"
      phase: "Substantive"
    - id: "se_divergence"
      agent: "預期用途差異評估員"
      icon: "⚠️"
      task: "評估適應症微小變更是否引發新的安全或有效性問題。"
      status: "Ready"
      phase: "Substantive"

    # --- Phase 4: Technical - Biocompatibility & Materials (技術審查 - 生物相容與材料) ---
    - id: "tech_biocompat"
      agent: "ISO 10993 生物相容性審查員"
      icon: "🔬"
      task: "依據 FDA 2023 生物相容性指南，審查細胞毒性、致敏性等端點。"
      status: "Ready"
      phase: "Technical"
    - id: "tech_toxicology"
      agent: "毒理學與風險評估員"
      icon: "☠️"
      task: "分析可瀝濾物/可提取物 (E&L) 報告及毒理學裕度 (MOS)。"
      status: "Ready"
      phase: "Technical"
    - id: "tech_materials"
      agent: "材料表徵分析師"
      icon: "🧪"
      task: "審查與人體接觸的聚合物、金屬及添加劑的化學表徵。"
      status: "Ready"
      phase: "Technical"
    - id: "tech_contact"
      agent: "接觸類型與時間分類員"
      icon: "⏱️"
      task: "確認器械與人體接觸的性質（如：植入物）及時間（短期/長期）。"
      status: "Ready"
      phase: "Technical"

    # --- Phase 5: Technical - Software & Cyber (技術審查 - 軟體與網絡安全) ---
    - id: "tech_sw_loc"
      agent: "軟體關注級別 (LOC) 判定員"
      icon: "💻"
      task: "依據 FDA 指南判定軟體為基本 (Basic) 或增強 (Enhanced) 文件級別。"
      status: "Ready"
      phase: "Technical"
    - id: "tech_cyber_arch"
      agent: "網絡安全架構審計員"
      icon: "🛡️"
      task: "審查威脅建模 (Threat Modeling) 與系統架構的安全防護機制。"
      status: "Ready"
      phase: "Technical"
    - id: "tech_sbom"
      agent: "SBOM 與漏洞掃描員"
      icon: "📦"
      task: "解析軟體物料清單 (SBOM) 並核對已知漏洞 (CVE)。"
      status: "Ready"
      phase: "Technical"
    - id: "tech_sw_vv"
      agent: "軟體驗證與確效 (V&V) 專家"
      icon: "✅"
      task: "審查軟體需求規格 (SRS)、測試案例與未解決異常 (Anomaly) 列表。"
      status: "Ready"
      phase: "Technical"
    - id: "tech_aiml"
      agent: "AI/ML 演算法評估員"
      icon: "🤖"
      task: "評估機器學習模型的訓練資料多樣性、偏差及預定變更控制計畫 (PCCP)。"
      status: "Ready"
      phase: "Technical"

    # --- Phase 6: Technical - Performance & Bench (技術審查 - 性能與台架測試) ---
    - id: "tech_emc"
      agent: "電氣安全與 EMC 審查員"
      icon: "⚡"
      task: "審查 IEC 60601-1 及 IEC 60601-1-2 測試報告的合規性。"
      status: "Ready"
      phase: "Technical"
    - id: "tech_sterilization"
      agent: "滅菌與保質期驗證員"
      icon: "🦠"
      task: "審查 EO/輻射滅菌確效報告、SAL 10^-6 標準及加速老化測試。"
      status: "Ready"
      phase: "Technical"
    - id: "tech_packaging"
      agent: "包裝與運輸完整性專家"
      icon: "📦"
      task: "審查 ASTM D4169 運輸測試及無菌屏障系統完整性。"
      status: "Ready"
      phase: "Technical"
    - id: "tech_bench"
      agent: "台架測試 (Bench Testing) 合規員"
      icon: "⚙️"
      task: "審查機械性能、疲勞測試及流體動力學測試是否符合 FDA 認可標準。"
      status: "Ready"
      phase: "Technical"
    - id: "tech_human_factors"
      agent: "可用性與人因工程分析師"
      icon: "👥"
      task: "評估使用錯誤風險及人因工程 (HFE) 總結報告。"
      status: "Ready"
      phase: "Technical"

    # --- Phase 7: Clinical & Animal Studies (臨床與動物研究) ---
    - id: "clin_rationale"
      agent: "臨床數據必要性評估員"
      icon: "🏥"
      task: "判斷技術差異是否需要臨床數據 (Clinical Data) 來證明 SE。"
      status: "Ready"
      phase: "Clinical"
    - id: "clin_stats"
      agent: "生物統計學分析員"
      icon: "📈"
      task: "審查臨床試驗的樣本數計算、P值及統計顯著性分析。"
      status: "Ready"
      phase: "Clinical"
    - id: "clin_animal"
      agent: "動物實驗 GLP 審查員"
      icon: "🐾"
      task: "審查活體動物研究設計及是否符合 GLP (21 CFR Part 58) 規範。"
      status: "Ready"
      phase: "Clinical"

    # --- Phase 8: Finalization (總結與決策) ---
    - id: "final_labeling"
      agent: "標籤與 UDI 合規審查員"
      icon: "🏷️"
      task: "審查產品標籤、IFU 及唯一器械標識 (UDI) 是否符合 21 CFR Part 801。"
      status: "Ready"
      phase: "Finalization"
    - id: "final_deficiency"
      agent: "缺陷信 (Deficiency) 彙整長"
      icon: "📝"
      task: "綜合所有代理人的意見，生成正式的 FDA 補充資料要求信 (AI Request)。"
      status: "Ready"
      phase: "Finalization"
