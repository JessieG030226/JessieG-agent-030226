pipeline:
  version: "4.0.0"
  system_name: "Swissmed Flower V4.0"
  stages:
    # --- PHASE 1: ADMINISTRATIVE & INGESTION (1-6) ---
    - id: stage_01_estar_parsing
      agent: "eSTAR 解析專家"
      icon: "🌸"
      task: "驗證 eSTAR 交互式 PDF 的完整性與版本兼容性。"
    - id: stage_02_cover_letter
      agent: "提交信函審查員"
      icon: "📄"
      task: "確認提交信中包含所有法規要求的關鍵聯絡資訊與聲明。"
    - id: stage_03_user_fee
      agent: "規費驗證官"
      icon: "💰"
      task: "核對 MDUFA 規費支付憑證與小微企業狀態。"
    - id: stage_04_indic_use
      agent: "預期用途分析師"
      icon: "🎯"
      task: "提取預期用途聲明並與資料庫中的標準格式進行比對。"
    - id: stage_05_device_descr
      agent: "器材描述專家"
      icon: "📐"
      task: "分析器材物理特性、組件與操作原理描述。"
    - id: stage_06_product_code
      agent: "產品代碼分類師"
      icon: "🏷️"
      task: "根據器材特徵驗證產品代碼 (Product Code) 的準確性。"

    # --- PHASE 2: RTA CHECKLIST (7-15) ---
    - id: stage_07_rta_admin
      agent: "RTA 行政合規官"
      icon: "🌿"
      task: "執行 15 天 RTA 行政完整性檢查。"
    - id: stage_08_biocompatibility
      agent: "生物相容性審查員"
      icon: "🧪"
      task: "驗證是否符合 ISO 10993 及其相關風險評估。"
    - id: stage_09_sterilization
      agent: "滅菌與貨架期專家"
      icon: "🧼"
      task: "審查滅菌驗證報告與包裝完整性測試數據。"
    - id: stage_10_software_loc
      agent: "軟體關切程度分析師"
      icon: "💻"
      task: "根據 FDA 指引判斷軟體關切程度 (Level of Concern)。"
    - id: stage_11_cybersecurity
      agent: "網絡安全審計員"
      icon: "🛡️"
      task: "評估網絡安全風險管理計畫與漏洞緩解措施。"
    - id: stage_12_emc_safety
      agent: "電磁兼容與電氣安全員"
      icon: "⚡"
      task: "核查 IEC 60601-1 系列測試報告的合規性。"
    - id: stage_13_reprocessing
      agent: "重複使用處理專家"
      icon: "♻️"
      task: "評估重複使用器材的清潔、消毒與滅菌指令。"
    - id: stage_14_human_factors
      agent: "人因工程審查員"
      icon: "🧠"
      task: "審查可用性測試報告與關鍵任務分析。"
    - id: stage_15_performance_bench
      agent: "台架性能測試分析師"
      icon: "⚙️"
      task: "驗證體外性能測試數據是否支持 Substantial Equivalence。"

    # --- PHASE 3: SUBSTANTIVE REVIEW & SE (16-25) ---
    - id: stage_16_predicate_id
      agent: "對照器材識別員"
      icon: "🌻"
      task: "驗證所選對照器材 (Predicate Device) 的合法上市狀態。"
    - id: stage_17_tech_compare
      agent: "技術特徵比較員"
      icon: "📊"
      task: "生成新器材與對照器材技術特徵的對照表。"
    - id: stage_18_clinical_data
      agent: "臨床數據評估員"
      icon: "🏥"
      task: "分析臨床研究數據的統計顯著性與臨床意義。"
    - id: stage_19_animal_testing
      agent: "動物實驗研究員"
      icon: "🐾"
      task: "審核動物模型的適用性與實驗結果。"
    - id: stage_20_chemical_char
      agent: "化學特性專家"
      icon: "⚗️"
      task: "評估材料的可提取物與瀝取物 (E&L) 數據。"
    - id: stage_21_radiology_spec
      agent: "放射影像專家"
      icon: "☢️"
      task: "針對成像器材，審查影像質量與劑量控制參數。"
    - id: stage_22_orthopedic_spec
      agent: "骨科器材專家"
      icon: "🦴"
      task: "審查植入物疲勞測試與靜態載荷數據。"
    - id: stage_23_cardio_spec
      agent: "心血管器材專家"
      icon: "🫀"
      task: "審查支架、導管的流體動力學測試數據。"
    - id: stage_24_ivd_spec
      agent: "體外診斷專家"
      icon: "🩸"
      task: "評估 IVD 試劑的檢測限 (LoD) 與特異性。"
    - id: stage_25_ai_sa_validator
      agent: "AI/ML 演算法驗證員"
      icon: "🤖"
      task: "針對 AI 醫療器材，審查演算法鎖定與偏見緩解措施。"

    # --- PHASE 4: FINALIZATION & LETTERS (26-31) ---
    - id: stage_26_deficiency_agg
      agent: "缺陷彙整專家"
      icon: "🌷"
      task: "整理所有代理人的審查意見並識別關鍵缺失。"
    - id: stage_27_boiler_plate
      agent: "標準條款校對員"
      icon: "🖋️"
      task: "確保缺陷信函使用 FDA 標準法律用語。"
    - id: stage_28_risk_benefit
      agent: "風險效益評估員"
      icon: "⚖️"
      task: "綜合評估器材的整體風險效益概況。"
    - id: stage_29_ai_letter_gen
      agent: "AI 補充資料信函生成器"
      icon: "✉️"
      task: "生成初步的 Additional Information (AI) 請求草案。"
    - id: stage_30_executive_sum
      agent: "執行摘要撰寫員"
      icon: "📝"
      task: "為 FDA 審查主管生成高層級的審查建議。"
    - id: stage_31_audit_compliance
      agent: "審計合規官"
      icon: "✅"
      task: "確保所有審查過程符合 21 CFR Part 11 要求。"
